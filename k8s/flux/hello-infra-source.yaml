apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: hello-infra
  namespace: flux-system
spec:
  interval: 1m
  url: ssh://git@github.com/tungdev1209/hello-infra
  ref:
    branch: main
  secretRef:
    name: hello-infra-token
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: hello-infra
  path: ./k8s/flux/traefik
  prune: true
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: hello-app
  namespace: flux-system
spec:
  interval: 1m
  sourceRef:
    kind: GitRepository
    name: hello-infra
  path: ./k8s/flux/hello-app
  prune: true
